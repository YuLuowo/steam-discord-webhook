name: Free Games Collector

on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install deps
        run: pip install -r requirements.txt

      - name: Run free games script
        env:
          WEBHOOK_URL: ${{ secrets.WEBHOOK_URL }}
        run: python free_games.py

      - name: Commit free history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add free_history.json || true
          git commit -m "Update free_history" || exit 0
          git push
